<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VB-ΠGDM Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#0a0a14;color:#e2e8f0;padding:28px;max-width:860px;margin:0 auto}
h1{font-size:22px;font-weight:800;letter-spacing:-.03em}h1 b{color:#8b5cf6}
.sub{font-size:11px;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:20px 0 16px}
.st{background:#0f0f1e;border:1px solid #1a1a30;border-radius:10px;padding:14px 10px;text-align:center}
.sv{font-size:26px;font-weight:800;line-height:1}.sl{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-top:5px;font-weight:600}
.card{background:#0f0f1e;border:1px solid #1a1a30;border-radius:12px;padding:20px;margin-bottom:14px}
.ch{font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tb{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:12px 14px}
.th{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tn{font-size:12px;font-weight:600}.tt{font-size:11px;color:#475569}
canvas{display:block}
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:10px}
th{text-align:left;padding:7px 5px;color:#475569;border-bottom:1px solid #1a1a30;font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:.05em}
td{padding:6px 5px;border-bottom:1px solid rgba(255,255,255,.03)}
tr:hover td{background:rgba(255,255,255,.02)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}
.ft{text-align:center;font-size:10px;color:#111;margin-top:18px}
</style></head><body>
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
<div><h1><b>◈</b> Stage VB-ΠGDM</h1><p class="sub">Dashboard local · Données Notion</p></div>
<p class="sub" style="margin-top:8px">01/04/2026 12:23</p></div>
<div class="stats" id="S"></div>
<div class="card"><div class="ch">Heures par jour</div><canvas id="bar" height="150"></canvas></div>
<div class="card"><div class="ch">Courbes par thème</div><div class="gr2" id="sp"></div></div>
<div class="card"><div class="ch">Tableau</div><div style="overflow-x:auto"><table id="T"></table></div></div>
<p class="ft">python tracker.py · python tracker.py add</p>
<script>
const E=[{"jour": "", "date": "", "signal": 0, "diffusion": 0, "vb": 0, "python": 0, "biblio": 0, "module": 0, "total": 0, "objectifs": "", "notes": "", "humeur": ""}, {"jour": "", "date": "2026-04-01", "signal": 0, "diffusion": 2, "vb": 0, "python": 0, "biblio": 2, "module": 0, "total": 4, "objectifs": "", "notes": "", "humeur": ""}],T=[{"key": "Signal", "label": "Signal & Maths", "color": "#818cf8"}, {"key": "Diffusion", "label": "Diffusion", "color": "#f59e0b"}, {"key": "VB", "label": "Inf\u00e9rence VB", "color": "#34d399"}, {"key": "Python", "label": "Code Python", "color": "#38bdf8"}, {"key": "Biblio", "label": "Biblio & R\u00e9dac.", "color": "#f472b6"}, {"key": "Module", "label": "Module Python", "color": "#a78bfa"}],dpr=devicePixelRatio||1;
// stats
const tot=E.reduce((s,e)=>s+(e.total||0),0),dw=E.filter(e=>(e.total||0)>0).length;
document.getElementById("S").innerHTML=[
{l:"Heures",v:tot.toFixed(1),c:"#8b5cf6"},{l:"Jours",v:dw,c:"#38bdf8"},
{l:"Moy/j",v:dw?(tot/dw).toFixed(1)+"h":"—",c:"#34d399"},{l:"Entrées",v:E.length,c:"#f59e0b"}
].map(s=>`<div class="st"><div class="sv" style="color:${s.c}">${s.v}</div><div class="sl">${s.l}</div></div>`).join("");
// bar chart
!function(){const c=document.getElementById("bar"),x=c.getContext("2d"),W=c.parentElement.clientWidth-40,H=150;
c.width=W*dpr;c.height=H*dpr;c.style.width=W+"px";c.style.height=H+"px";x.scale(dpr,dpr);
const bw=Math.min(28,(W-40)/E.length-3),mx=Math.max(...E.map(e=>T.reduce((s,t)=>s+(e[t.key.toLowerCase()]||0),0)),1);
E.forEach((e,i)=>{let y=H-20;const bx=30+i*(bw+3);
T.forEach(t=>{const v=e[t.key.toLowerCase()]||0,bh=v/mx*(H-30);if(bh>0){x.fillStyle=t.color;x.globalAlpha=.85;x.beginPath();x.roundRect(bx,y-bh,bw,bh,2);x.fill();x.globalAlpha=1}y-=bh});
x.fillStyle="#475569";x.font="9px JetBrains Mono";x.textAlign="center";x.fillText((e.date||"").slice(5),bx+bw/2,H-6)})}();
// sparklines
const sp=document.getElementById("sp");
T.forEach((t,idx)=>{const d=E.map(e=>e[t.key.toLowerCase()]||0),s=d.reduce((a,b)=>a+b,0);
sp.innerHTML+=`<div class="tb"><div class="th"><span class="tn" style="color:${t.color}">${t.label}</span><span class="tt">${s.toFixed(1)}h</span></div><canvas id="s${idx}" height="44"></canvas></div>`});
T.forEach((t,idx)=>{const cv=document.getElementById("s"+idx);if(!cv)return;
const d=E.map(e=>e[t.key.toLowerCase()]||0);if(d.length<2)return;
const x=cv.getContext("2d"),W=cv.parentElement.clientWidth-10,H=44;
cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";x.scale(dpr,dpr);
const mx=Math.max(...d,.5),pts=d.map((v,i)=>[i/(d.length-1)*W,H-3-v/mx*(H-8)]);
const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,t.color+"55");g.addColorStop(1,t.color+"00");
x.beginPath();x.moveTo(0,H);pts.forEach(p=>x.lineTo(p[0],p[1]));x.lineTo(W,H);x.closePath();x.fillStyle=g;x.fill();
x.beginPath();pts.forEach((p,i)=>i?x.lineTo(p[0],p[1]):x.moveTo(p[0],p[1]));x.strokeStyle=t.color;x.lineWidth=2.5;x.lineJoin="round";x.lineCap="round";x.stroke();
const l=pts[pts.length-1];x.beginPath();x.arc(l[0],l[1],3.5,0,Math.PI*2);x.fillStyle=t.color;x.fill()});
// table
let h="<thead><tr><th>Jour</th><th>Date</th>";T.forEach(t=>h+=`<th><span class="dot" style="background:${t.color}"></span>${t.key}</th>`);
h+="<th>Total</th><th>😊</th></tr></thead><tbody>";
E.forEach(e=>{h+=`<tr><td>${e.jour}</td><td style="color:#475569">${e.date}</td>`;
T.forEach(t=>{const v=e[t.key.toLowerCase()]||0;h+=`<td style="color:${v>0?t.color:'#1e293b'}">${v}</td>`});
h+=`<td style="font-weight:700;color:#c4b5fd">${e.total}</td><td>${e.humeur}</td></tr>`});
document.getElementById("T").innerHTML=h+"</tbody>";
</script></body></html>
